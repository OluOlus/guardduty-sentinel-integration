name: Python Unit Tests

on:
  push:
    paths:
      - "scripts/lambda_ingestion_handler.py"
      - "tests/test_lambda_ingestion_handler.py"
      - ".github/workflows/test-python.yml"
  pull_request:
    paths:
      - "scripts/lambda_ingestion_handler.py"
      - "tests/test_lambda_ingestion_handler.py"
      - ".github/workflows/test-python.yml"

jobs:
  test:
    name: Run unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m pytest tests/test_lambda_ingestion_handler.py -v

      - name: Verify handler imports cleanly (no Lambda env required)
        run: |
          python -c "
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location(
              'lambda_ingestion_handler',
              pathlib.Path('scripts/lambda_ingestion_handler.py')
          )
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print('Import OK')
          "
