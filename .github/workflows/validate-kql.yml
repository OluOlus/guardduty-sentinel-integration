name: KQL and deployment parity

on:
  push:
    paths:
      - "kql/**"
      - "deployment/**"
      - "scripts/sync_arm_template.py"
      - "tests/contracts/**"
      - ".github/workflows/validate-kql.yml"
  pull_request:
    paths:
      - "kql/**"
      - "deployment/**"
      - "scripts/sync_arm_template.py"
      - "tests/contracts/**"
      - ".github/workflows/validate-kql.yml"

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[test]"
      - name: Generated ARM is current
        run: python scripts/sync_arm_template.py --check
      - name: Contract and deployment parity tests
        run: python -m pytest tests/contracts -q
      - name: Compile Bicep
        run: az bicep build --file deployment/deploy.bicep --outfile /tmp/guardduty-deploy.json
