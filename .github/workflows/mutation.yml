name: Mutation quality gate

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[test,mutation]"
      - name: Require tests to kill handler mutations
        run: mutmut run
      - name: Enforce mutation-score ratchet
        run: |
          mutmut export-cicd-stats
          python scripts/check_mutation_score.py --minimum 70
      - name: Print surviving mutations on failure
        if: failure()
        run: mutmut results
